<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Architecture - Sınav Seçimi</title>
    <style>
        /* --- Dark Mode Gövde ve Konteyner --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            background-color: #1e1e1e;
            color: #f0f0f0;
            margin: 0;
            padding: 20px;
            padding-top: 0;
        }

        /* --- Geri Dön Butonu --- */
        .nav-container {
            max-width: 900px;
            margin: 0 auto;
            text-align: left;
            padding: 20px 20px 0 20px;
        }

        .geri-butonu {
            display: inline-block;
            margin-bottom: 15px;
            padding: 8px 15px;
            background-color: #6a0dad;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .geri-butonu:hover {
            background-color: #510a8c;
        }

        /* --- Ana İçerik Kutusu --- */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 30px;
            box-shadow: none;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            border-bottom: 3px solid #2e7d32;
            padding-bottom: 10px;
        }

        /* === Sınav Buton Stili === */
        .sinav-butonu {
            display: block;
            width: 80%;
            margin: 20px auto;
            padding: 20px 30px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #6a0dad;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            transition: background-color 0.3s, transform 0.2s;
        }

        .sinav-butonu:hover {
            background-color: #510a8c;
            transform: scale(1.03);
        }
    </style>
</head>

<body>

    <div class="nav-container">
        <a href="../index.html" class="geri-butonu">🏠 Ana Sayfaya Geri Dön</a>
    </div>

    <div class="container">

        <h1>Computer Architecture</h1>
        <p style="text-align: center; font-size: 1.1em; color: #f0f0f0;">
            Lütfen notlarını görmek istediğin sınav türünü seç:
        </p>

        <a href="ca_vize.html" class="sinav-butonu">
            📝 Vize Notları
        </a>

    </div>
</body>

</html>
